<script>
    function switchTab(el, type) {
        // Update Tab Styling
        const buttons = el.parentElement.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.classList.remove('active-tab');
            btn.classList.add('text-on-surface-variant');
        });
        el.classList.add('active-tab');
        el.classList.remove('text-on-surface-variant');

        // Simulate Data Change
        const list = document.getElementById('leaderboard-list');
        list.style.opacity = '0';
        list.style.transform = 'translateY(10px)';
        
        const units = {
            'duration': 'min',
            'calories': 'kcal',
            'count': '次'
        };
        
        const data = {
            'duration': [98, 85, 74, 62],
            'calories': [840, 720, 680, 590],
            'count': [24, 21, 18, 15]
        };

        setTimeout(() => {
            const items = list.querySelectorAll('.text-right span');
            items.forEach((span, index) => {
                span.innerHTML = `${data[type][index]}<span class="text-xs ml-1 font-normal text-on-surface-variant">${units[type]}</span>`;
            });
            
            // Update top 3 stats as well
            const top3Values = {
                'duration': [182, 145, 120],
                'calories': [1250, 1100, 980],
                'count': [45, 42, 38]
            };
            
            const podiumValueWrappers = document.querySelectorAll('.grid > div .text-lg, .grid > div .text-2xl');
            // Index 0 is 2nd place value
            podiumValueWrappers[0].innerHTML = `${top3Values[type][1]}<span class="text-[10px] ml-0.5 font-normal text-on-surface-variant">${units[type]}</span>`;
            // Index 1 is 1st place value
            podiumValueWrappers[1].innerHTML = `${top3Values[type][0]}<span class="text-xs ml-0.5 font-normal text-on-surface-variant">${units[type]}</span>`;
            // Index 2 is 3rd place value
            podiumValueWrappers[2].innerHTML = `${top3Values[type][2]}<span class="text-[10px] ml-0.5 font-normal text-on-surface-variant">${units[type]}</span>`;

            list.style.opacity = '1';
            list.style.transform = 'translateY(0)';
            list.style.transition = 'all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
        }, 250);
    }
</script>
