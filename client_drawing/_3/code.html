<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .pulse-animation {
            animation: pulse-ring 3s infinite ease-in-out;
        }
        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tap-scale {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .tap-scale:active {
            transform: scale(0.96);

<script>
        document.querySelectorAll('.tap-scale').forEach(button => {
            button.addEventListener('touchstart', () => {});
        });

        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const backgrounds = document.querySelectorAll('.fixed > div');
            if(backgrounds[0]) backgrounds[0].style.transform = `translate(${moveX}px, ${moveY}px)`;
            if(backgrounds[1]) backgrounds[1].style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });
    </script>
