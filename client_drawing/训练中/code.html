<script>
        // Micro-interaction: Timer progress simulation
        const progressRing = document.getElementById('timer-progress');
        const totalOffset = 820; // Dasharray value
        let currentSecond = 45;
        const totalTime = 60;

        function updateTimer() {
            const percentage = currentSecond / totalTime;
            const offset = totalOffset - (percentage * totalOffset);
            progressRing.style.strokeDashoffset = offset;
        }

        // Simple button active state visual feedback
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
            btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
        });

        // Initialize timer position
        updateTimer();

        // Optional: Interactive Pause/Play toggle logic
        let isPaused = false;
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            if(isPaused) {
                pauseBtn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>继续';
                pauseBtn.classList.add('bg-primary-container/10', 'text-primary');
            } else {
                pauseBtn.innerHTML = '<span class="material-symbols-outlined">pause</span>暂停';
                pauseBtn.classList.remove('bg-primary-container/10', 'text-primary');
            }
        });
    </script>
